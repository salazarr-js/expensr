<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">

    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d9488">
    <meta name="description" content="Personal expense tracker with smart categorization">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Expensr">

    <title>Expensr</title>
  </head>
  <body>
    <div id="app" class="isolate">
      <!-- Inline splash — visible until Vue mounts, then replaced -->
      <div id="splash" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#fafafa">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <style>@keyframes spin{to{transform:rotate(360deg)}}@media(prefers-color-scheme:dark){#splash{background:#09090b}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
